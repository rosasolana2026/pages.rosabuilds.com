<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — pages.rosabuilds.com</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231c1410'/><text x='6' y='24' font-size='20' fill='%239b3060'>p</text></svg>">
  <style>
    body { background: var(--cream-dark); min-height: 100vh; }

    /* Top bar */
    .dash-bar {
      position: sticky; top: 0; z-index: 100;
      height: 56px;
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; gap: 16px;
    }
    .dash-logo { display:flex; align-items:center; gap:10px; font-weight:600; font-size:0.9375rem; color:var(--text); text-decoration:none; }
    .dash-logo-mark { width:28px; height:28px; background:var(--text); border-radius:6px; display:flex; align-items:center; justify-content:center; }
    .dash-logo em { font-style:normal; color:var(--rose); }
    .dash-nav { display:flex; gap:4px; }
    .dash-nav a { font-size:0.875rem; font-weight:500; color:var(--muted); padding:6px 12px; border-radius:6px; transition:color 0.15s, background 0.15s; }
    .dash-nav a:hover { color:var(--text); background:var(--cream-dark); }

    /* Main layout */
    .dash-main { max-width: 1100px; margin: 0 auto; padding: 36px 28px 80px; }

    /* API key section */
    .key-section {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 28px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .key-label { font-size:0.8125rem; font-weight:600; color:var(--text); white-space:nowrap; }
    .key-input {
      flex: 1; min-width: 260px;
      font-family: var(--mono); font-size: 0.875rem;
      background: var(--cream-dark); border: 1px solid var(--border-dk);
      border-radius: 6px; padding: 9px 14px; color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .key-input:focus { border-color: var(--rose); }
    .key-status { font-size:0.8125rem; color:var(--muted); white-space:nowrap; }
    .key-status.ok { color: #27ae60; }
    .key-status.err { color: #e74c3c; }

    /* Stats row */
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
    .stat-card { background:var(--cream); border:1px solid var(--border); border-radius:8px; padding:20px 24px; }
    .stat-label { font-size:0.75rem; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:8px; }
    .stat-value { font-family:var(--serif); font-style:italic; font-size:2rem; font-weight:500; color:var(--text); line-height:1; }

    /* Upload zone */
    .upload-zone {
      background: var(--cream);
      border: 2px dashed var(--border-dk);
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      margin-bottom: 28px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover { border-color: var(--rose); background: var(--rose-dim); }
    .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-icon { width:40px; height:40px; margin:0 auto 12px; color:var(--muted); }
    .upload-title { font-weight:600; font-size:0.9375rem; color:var(--text); margin-bottom:6px; }
    .upload-sub { font-size:0.875rem; color:var(--muted); }

    /* Upload progress/result */
    .upload-result {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 28px;
      display: none;
    }
    .upload-result.show { display: block; }
    .upload-result-url {
      font-family: var(--mono); font-size: 0.9375rem; color: var(--rose);
      font-weight: 500; margin-bottom: 8px;
    }
    .upload-result-url a { text-decoration: underline; text-underline-offset: 2px; }
    .upload-result-meta { font-size: 0.8125rem; color: var(--muted); }

    /* Sites section */
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .section-title { font-weight:600; font-size:1rem; color:var(--text); }

    /* Sites grid */
    .sites-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:16px; }

    .site-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
      transition: border-color 0.15s;
    }
    .site-card:hover { border-color: var(--border-dk); }
    .site-id { font-family:var(--mono); font-size:0.75rem; color:var(--muted); }
    .site-url { font-family:var(--mono); font-size:0.875rem; color:var(--rose); font-weight:500; }
    .site-url a { text-decoration:underline; text-underline-offset:2px; }
    .site-meta { font-size:0.8125rem; color:var(--muted); }
    .site-actions { display:flex; gap:8px; margin-top:4px; }
    .btn-visit { font-size:0.8125rem; padding:6px 14px; }
    .btn-delete {
      font-size:0.8125rem; padding:6px 14px;
      background:transparent; color:var(--muted);
      border:1px solid var(--border-dk); border-radius:6px;
      cursor:pointer; transition:all 0.15s; font-family:var(--sans);
    }
    .btn-delete:hover { border-color:#e74c3c; color:#e74c3c; background:rgba(231,76,60,0.05); }

    /* Empty / loading states */
    .state-empty, .state-loading {
      background: var(--cream); border: 1px solid var(--border); border-radius: 8px;
      padding: 56px 24px; text-align: center; grid-column: 1/-1;
    }
    .state-empty-title { font-weight:600; font-size:0.9375rem; color:var(--text); margin-bottom:6px; }
    .state-empty-sub { font-size:0.875rem; color:var(--muted); }

    /* Upload in progress */
    .uploading { opacity:0.6; pointer-events:none; }

    @media (max-width: 680px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .dash-bar { padding: 0 16px; }
      .dash-main { padding: 24px 16px 60px; }
      .key-section { flex-direction: column; align-items: flex-start; }
      .key-input { width: 100%; }
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="dash-bar">
  <a href="/" class="dash-logo">
    <div class="dash-logo-mark">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="5" height="7" rx="1" fill="white" opacity="0.9"/>
        <rect x="9" y="2" width="5" height="4" rx="1" fill="#9b3060"/>
        <rect x="9" y="8" width="5" height="6" rx="1" fill="white" opacity="0.5"/>
        <rect x="2" y="11" width="5" height="3" rx="1" fill="white" opacity="0.4"/>
      </svg>
    </div>
    <span>pages<em>.rosabuilds</em></span>
  </a>
  <nav class="dash-nav">
    <a href="/">Home</a>
    <a href="/docs">Docs</a>
  </nav>
</header>

<!-- MAIN -->
<main class="dash-main">

  <!-- API Key input -->
  <div class="key-section">
    <span class="key-label">API Key</span>
    <input type="text" class="key-input" id="apiKey" placeholder="pages_agent_Kx9mR4pQ3w" autocomplete="off" spellcheck="false">
    <button class="btn btn-rose btn-sm" onclick="loadSites()">Load sites</button>
    <span class="key-status" id="keyStatus"></span>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Total sites</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total files</div>
      <div class="stat-value" id="statFiles">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Storage used</div>
      <div class="stat-value" id="statSize">0 KB</div>
    </div>
  </div>

  <!-- Upload zone -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" multiple accept="*/*" onchange="handleFiles(this.files)">
    <svg class="upload-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M20 26V14M14 20l6-6 6 6"/>
      <rect x="6" y="6" width="28" height="28" rx="4"/>
    </svg>
    <div class="upload-title">Drop files here or click to browse</div>
    <div class="upload-sub">Upload HTML, CSS, JS, images — any static files. Requires API key above.</div>
  </div>

  <!-- Upload result -->
  <div class="upload-result" id="uploadResult">
    <div class="upload-result-url" id="resultUrl"></div>
    <div class="upload-result-meta" id="resultMeta"></div>
  </div>

  <!-- Sites list -->
  <div id="sitesSection" style="display:none">
    <div class="section-header">
      <span class="section-title" id="sitesTitle">Your sites</span>
    </div>
    <div class="sites-grid" id="sitesGrid"></div>
  </div>

</main>

<script>
  const API = '/api';
  let currentKey = '';
  let sitesData = [];

  // Restore key from localStorage
  const savedKey = localStorage.getItem('pages_api_key');
  if (savedKey) {
    document.getElementById('apiKey').value = savedKey;
  }

  // Enter key to load
  document.getElementById('apiKey').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadSites();
  });

  async function loadSites() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) return;
    currentKey = key;
    localStorage.setItem('pages_api_key', key);

    const status = document.getElementById('keyStatus');
    status.textContent = 'Loading...';
    status.className = 'key-status';

    try {
      const res = await fetch(`${API}/sites`, { headers: { 'x-api-key': key } });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        status.textContent = `Error: ${err.error || res.statusText}`;
        status.className = 'key-status err';
        return;
      }
      sitesData = await res.json();
      status.textContent = `✓ Valid key — ${sitesData.length} site${sitesData.length !== 1 ? 's' : ''}`;
      status.className = 'key-status ok';
      renderStats();
      renderSites();
    } catch (err) {
      status.textContent = `Network error: ${err.message}`;
      status.className = 'key-status err';
    }
  }

  function renderStats() {
    const total = sitesData.length;
    const files = sitesData.reduce((s, x) => s + (x.file_count || 0), 0);
    const bytes = sitesData.reduce((s, x) => s + (x.size_bytes || 0), 0);
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statFiles').textContent = files;
    document.getElementById('statSize').textContent = formatBytes(bytes);
    document.getElementById('statsRow').style.display = total > 0 || sitesData !== null ? 'grid' : 'none';
  }

  function renderSites() {
    const section = document.getElementById('sitesSection');
    const grid = document.getElementById('sitesGrid');
    const title = document.getElementById('sitesTitle');

    section.style.display = 'block';
    title.textContent = `Your sites (${sitesData.length})`;

    if (sitesData.length === 0) {
      grid.innerHTML = `
        <div class="state-empty">
          <div class="state-empty-title">No sites yet</div>
          <div class="state-empty-sub">Upload files above to deploy your first site instantly.</div>
        </div>`;
      return;
    }

    grid.innerHTML = sitesData.map(site => `
      <div class="site-card" id="card-${site.id}">
        <div>
          <div class="site-id">${site.id}</div>
          <div class="site-url"><a href="${site.url}" target="_blank">${site.url}</a></div>
        </div>
        <div class="site-meta">
          ${site.file_count} file${site.file_count !== 1 ? 's' : ''} · ${formatBytes(site.size_bytes)} · ${formatDate(site.created_at)}
        </div>
        <div class="site-actions">
          <a href="${site.url}" target="_blank" class="btn btn-outline btn-visit">Visit →</a>
          <button class="btn-delete" onclick="deleteSite('${site.id}')">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function deleteSite(id) {
    if (!confirm(`Delete site ${id}? This cannot be undone.`)) return;
    const key = document.getElementById('apiKey').value.trim();
    try {
      const res = await fetch(`${API}/sites/${id}`, {
        method: 'DELETE',
        headers: { 'x-api-key': key }
      });
      if (res.ok) {
        sitesData = sitesData.filter(s => s.id !== id);
        renderStats();
        renderSites();
      } else {
        const err = await res.json().catch(() => ({}));
        alert(err.error || 'Delete failed');
      }
    } catch (err) {
      alert('Network error: ' + err.message);
    }
  }

  // Drag and drop
  const zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });

  async function handleFiles(fileList) {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) {
      alert('Enter your API key first');
      return;
    }
    if (!fileList || fileList.length === 0) return;

    zone.classList.add('uploading');
    zone.querySelector('.upload-title').textContent = `Uploading ${fileList.length} file(s)...`;

    try {
      // Read files as base64
      const files = await Promise.all(Array.from(fileList).map(f => readFileAsBase64(f)));

      const res = await fetch(`${API}/upload`, {
        method: 'POST',
        headers: {
          'x-api-key': key,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ files })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || res.statusText);
      }

      // Show result
      const result = document.getElementById('uploadResult');
      document.getElementById('resultUrl').innerHTML = `
        <a href="${data.url}" target="_blank">${data.url}</a>
      `;
      document.getElementById('resultMeta').textContent =
        `${fileList.length} file${fileList.length !== 1 ? 's' : ''} deployed · ID: ${data.id}`;
      result.classList.add('show');

      // Refresh sites
      await loadSites();
    } catch (err) {
      alert('Upload failed: ' + err.message);
    } finally {
      zone.classList.remove('uploading');
      zone.querySelector('.upload-title').textContent = 'Drop files here or click to browse';
      document.getElementById('fileInput').value = '';
    }
  }

  function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        resolve({ path: file.name, content: base64 });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function formatBytes(b) {
    if (!b) return '0 B';
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / (1024 * 1024)).toFixed(1) + ' MB';
  }

  function formatDate(unix) {
    if (!unix) return '';
    return new Date(unix * 1000).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // Auto-load if key is saved
  if (savedKey) {
    loadSites();
  }
</script>

</body>
</html>
